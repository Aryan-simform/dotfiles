font_family FiraCode Nerd Font Mono
background #11111b
foreground #cdd6f4

background_opacity 0.85
background_blur 10

font_size 12.5

cursor #f5e0dc
cursor_shape beam

selection_background #45475a
selection_foreground #ffffff

window_padding_width 12

enable_audio_bell no
visual_bell_duration 0
tab_bar_style separator
tab_bar_min_tabs 2

# Splits
map ctrl+shift+enter launch --location=hsplit
map ctrl+shift+v launch --location=vsplit

# Navigation (SAFE - avoids LazyVim conflicts)
map alt+left neighboring_window left
map alt+right neighboring_window right
map alt+up neighboring_window up
map alt+down neighboring_window down

# Close split
map ctrl+shift+w close_window

# Resize (SAFE)
map ctrl+shift+alt+left resize_window narrower 5
map ctrl+shift+alt+right resize_window wider 5
map ctrl+shift+alt+up resize_window taller 5
map ctrl+shift+alt+down resize_window shorter 5

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+shift+tab next_tab

# Remove titlebar
hide_window_decorations yes

# Ghostty feel
window_padding_width 14
background_opacity 0.85

# Clean tabs
tab_bar_style separator
tab_bar_min_tabs 2
tab_title_template "{title}"

# Enable system clipboard
clipboard_control write-clipboard read-clipboard

# Copy
map ctrl+shift+c copy_to_clipboard

# Paste (ONLY this for paste)
map ctrl+v paste_from_clipboard

# Select last command/output
map ctrl+shift+u select_output
map ctrl+shift+g select_command
map ctrl+shift+y copy_last_output

# Selection mode
map ctrl+shift+space start_selection

# Block selection
map ctrl+shift+b start_selection rectangle

# Select all
map ctrl+shift+a select_all

# URL hints
map ctrl+shift+o open_url_with_hints

# Copy last output
map ctrl+shift+y launch --stdin-source=@last_cmd_output --type=overlay sh -c 'cat'

# Navigate commands
map ctrl+shift+k scroll_to_previous_prompt
map ctrl+shift+j scroll_to_next_prompt

# Select block with mouse
mouse_map right press ungrabbed mouse_select_command_output

shell_integration enabled

# Ctrl+Backspace → delete previous word
map ctrl+backspace send_text all \x17
